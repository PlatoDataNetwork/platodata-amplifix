<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.png" type="image/png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plato AI - Secure Network Protocol for the Next Web</title>
    <meta
      name="description"
      content="Web3 AI code creation, automation, and vertical data intelligence. A decentralized, consensus-driven AI network ensuring trust & transparency."
    />
    <meta name="author" content="Plato Technologies Inc" />

    <!-- Preconnect to Google Fonts for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Inter font with multiple weights - non-render-blocking -->
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet"
      />
    </noscript>

    <meta property="og:title" content="Plato AI - Secure Network Protocol for the Next Web" />
    <meta
      property="og:description"
      content="Web3 AI code creation, automation, and vertical data intelligence. A decentralized, consensus-driven AI network ensuring trust & transparency."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.platodata.io" />
    <meta property="og:image" content="https://www.platodata.io/images/article-default-img.jpg" />
    <meta property="og:site_name" content="Platodata" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@PlatoDataIO" />
    <meta name="twitter:image" content="https://www.platodata.io/images/article-default-img.jpg" />
  </head>

  <body>
    <script>
      // CRITICAL: Clear googtrans cookie BEFORE Google Translate script loads
      // URL is the single source of truth for language
      (function() {
        var segs = window.location.pathname.split('/').filter(Boolean);
        var validLangs = ["ar","bn","zh-CN","zh-TW","da","nl","et","fi","fr","de","el","iw","hi","hu","id","it","ja","km","ko","no","fa","pl","pt","pa","ro","ru","sl","es","sv","th","tr","uk","ur","vi"];
        var urlLang = (segs[0] && validLangs.indexOf(segs[0]) !== -1) ? segs[0] : "en";
        var host = window.location.hostname;
        var apex = host.indexOf("www.") === 0 ? host.slice(4) : host;
        var domains = ["", host, "." + host];
        if (apex !== host) { domains.push(apex, "." + apex); }

        // Always clear first
        domains.forEach(function(d) {
          var c = "googtrans=; path=/; expires=Thu, 01 Jan 1970 00:00:00 GMT";
          if (d) c += "; domain=" + d;
          document.cookie = c;
        });

        // Only re-set if URL has a non-English language prefix
        if (urlLang !== "en") {
          domains.forEach(function(d) {
            var c = "googtrans=/en/" + urlLang + "; path=/";
            if (d) c += "; domain=" + d;
            document.cookie = c;
          });
        }
      })();
    </script>
    

    <div class="gtranslate_wrapper hidden"></div>
    <script>
      window.gtranslateSettings = {
        default_language: "en",
        url_structure: "sub_directory",
        languages: ["en","ar","bn","zh-CN","zh-TW","da","nl","et","fi","fr","de","el","iw","hi","hu","id","it","ja","km","ko","no","fa","pl","pt","pa","ro","ru","sl","es","sv","th","tr","uk","ur","vi"],
        wrapper_selector: ".gtranslate_wrapper",
        switcher_horizontal_position: "right",
        switcher_vertical_position: "top"
      };
    </script>
    <script src="https://cdn.gtranslate.net/widgets/latest/float.js" defer></script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
