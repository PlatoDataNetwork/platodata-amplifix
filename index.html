<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.png" type="image/png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plato AI - Secure Network Protocol for the Next Web</title>
    <meta
      name="description"
      content="Web3 AI code creation, automation, and vertical data intelligence. A decentralized, consensus-driven AI network ensuring trust & transparency."
    />
    <meta name="author" content="Plato Technologies Inc" />

    <!-- Preconnect to Google Fonts for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Inter font with multiple weights for consistency across browsers -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <meta property="og:title" content="Plato AI - Secure Network Protocol for the Next Web" />
    <meta
      property="og:description"
      content="Web3 AI code creation, automation, and vertical data intelligence. A decentralized, consensus-driven AI network ensuring trust & transparency."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.platodata.io" />
    <meta property="og:image" content="https://www.platodata.io/images/article-default-img.jpg" />
    <meta property="og:site_name" content="Platodata" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@PlatoDataIO" />
    <meta name="twitter:image" content="https://www.platodata.io/images/article-default-img.jpg" />
  </head>

  <body>
    <!--  CRITICAL: Handle Google Translate state BEFORE any scripts load -->
    <script>
      (function() {
        // Remove cache-buster param to avoid URLs growing on repeated language switches
        // (keep other query params intact).
        try {
          var _url = new URL(window.location.href);
          if (_url.searchParams.has('_gt')) {
            _url.searchParams.delete('_gt');
            var _q = _url.searchParams.toString();
            history.replaceState(null, '', _url.pathname + (_q ? '?' + _q : '') + _url.hash);
          }
        } catch (e) {}

        var path = window.location.pathname;
        var seg = path.split('/').filter(Boolean)[0] || '';
        // Supported language codes (must match i18nLanguages.ts)
        var supported = ['ar','bn','zh-CN','zh-TW','da','nl','et','fi','fr','de','el','iw','hi','hu','id','it','ja','km','ko','no','fa','pl','pt','pa','ro','ru','sl','es','sv','th','tr','uk','ur','vi'];
        var isLangPrefix = supported.indexOf(seg) !== -1;

        function getCookieDomains() {
          var host = window.location.hostname;
          var base = host.indexOf('www.') === 0 ? host.slice(4) : host;
          var domains = ['', host, '.' + host];
          // IMPORTANT: also clear/set apex domain cookies (e.g. .platodata.io)
          if (base && base !== host) {
            domains.push(base, '.' + base);
          }
          // de-dup
          var seen = {};
          return domains.filter(function(d) {
            if (seen[d]) return false;
            seen[d] = true;
            return true;
          });
        }

        // Helper to clear all googtrans cookies
        function clearAllGoogTransCookies() {
          getCookieDomains().forEach(function(domain) {
            var cookieStr = 'googtrans=; path=/; expires=Thu, 01 Jan 1970 00:00:00 GMT';
            if (domain) cookieStr += '; domain=' + domain;
            document.cookie = cookieStr;
          });
        }

        function setGoogTransCookie(value) {
          getCookieDomains().forEach(function(domain) {
            var cookieStr = 'googtrans=' + value + '; path=/';
            if (domain) cookieStr += '; domain=' + domain;
            document.cookie = cookieStr;
          });
        }

        // Check what language the cookie says
        function getCookieLang() {
          var cookies = document.cookie.split(';');
          var lang = null;
          for (var i = 0; i < cookies.length; i++) {
            var parts = cookies[i].trim().split('=');
            if (parts[0] === 'googtrans' && parts[1]) {
              var m = parts[1].match(/\/en\/([a-zA-Z\-]+)/);
              if (m && m[1]) {
                // If multiple googtrans cookies exist, prefer the last one.
                lang = m[1];
              }
            }
          }
          return lang;
        }

        var cookieLang = getCookieLang();
        var urlLang = isLangPrefix ? seg : 'en';

        // CASE 1: Root domain (English) - clear everything
        if (!isLangPrefix) {
          clearAllGoogTransCookies();
          // Remove translation classes immediately
          document.documentElement.classList.remove('translated-ltr', 'translated-rtl');
          if (document.body) {
            document.body.classList.remove('translated-ltr', 'translated-rtl');
          }
          // Clear localStorage items Google Translate might use
          try {
            localStorage.removeItem('googtrans');
            localStorage.removeItem('google_translate_element');
          } catch(e) {}
        }
        // CASE 2: Language URL but cookie has different language - fix the mismatch
        else if (cookieLang && cookieLang !== urlLang) {
          clearAllGoogTransCookies();
          // Set correct cookie for this URL's language
          setGoogTransCookie('/en/' + urlLang);
        }
        // CASE 3: Language URL but no cookie - set it
        else if (!cookieLang && isLangPrefix) {
          setGoogTransCookie('/en/' + urlLang);
        }
      })();
    </script>

    <!-- Hidden Google Translate element - MUST be outside React root -->
    <div id="google_translate_element" style="display:none !important;"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
